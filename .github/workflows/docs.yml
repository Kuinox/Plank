name: Deploy docs

on:
  push:
    branches:
      - master
    paths:
      - ".config/dotnet-tools.json"
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "Plank/**"
      - "Plank.Snappy/**"
      - "Plank.SourceGen/**"
      - "Plank.Native.Zlib/artifacts/packages/**"
      - "NuGet.config"
      - "Plank.sln"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout DocFX Roslyn highlighter
        uses: actions/checkout@v4
        with:
          repository: Kuinox/docfx-roslyn-highlight
          path: .tools/docfx-roslyn-highlight

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build docs
        shell: pwsh
        run: ./docs/build.ps1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
